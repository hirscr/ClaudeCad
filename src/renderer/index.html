<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClaudeCAD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <span class="app-title">ClaudeCAD</span>
        <span class="toolbar-separator"></span>
        <button id="open-button" class="header-button" title="Open Project (Cmd+O)">
          <span class="button-icon">📂</span>
        </button>
        <button id="save-button" class="header-button" title="Save Project (Cmd+S)">
          <span class="button-icon">💾</span>
        </button>
        <span class="toolbar-separator"></span>
        <button id="undo-button" class="header-button" title="Undo (Cmd+Z)">
          <span class="button-icon">↩</span>
        </button>
        <button id="redo-button" class="header-button" title="Redo (Cmd+Shift+Z)">
          <span class="button-icon">↪</span>
        </button>
      </div>
      <div class="header-right">
        <span id="measure-distance"></span>
        <button id="measure-button" class="header-button" title="Measure Distance (M)">
          <span class="button-icon">📏</span>
        </button>
        <button id="refresh-context-button" class="header-button" title="Refresh Claude Context">
          <span class="button-icon">🔄</span>
        </button>
        <button id="export-stl-button" class="header-button" title="Export STL (Cmd+E)">
          <span class="button-icon">📦</span>
        </button>
        <select id="view-dropdown">
          <option value="isometric">Isometric</option>
          <option value="front">Front</option>
          <option value="back">Back</option>
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>
    </div>
    <div id="viewport">
      <div id="loading-overlay" class="hidden">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <div id="chat-panel">
      <div id="chat-resize-handle"></div>
      <div id="chat-messages"></div>
      <div id="chat-input-container">
        <textarea id="chat-input" placeholder="Type a message..."></textarea>
        <button id="send-button">Send</button>
      </div>
    </div>
    <div id="status-bar">
      <span id="status-text">Ready</span>
      <span id="status-stats"></span>
    </div>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
