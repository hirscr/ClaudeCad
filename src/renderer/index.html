<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClaudeCAD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <span class="app-title">ClaudeCAD</span>
        <span class="toolbar-separator"></span>
        <button id="open-button" class="header-button" title="Open Project (Cmd+O)">
          <span class="button-icon">📂</span>
        </button>
        <button id="save-button" class="header-button" title="Save Project (Cmd+S)">
          <span class="button-icon">💾</span>
        </button>
        <span class="toolbar-separator"></span>
        <button id="undo-button" class="header-button" title="Undo (Cmd+Z)">
          <span class="button-icon">↩</span>
        </button>
        <button id="redo-button" class="header-button" title="Redo (Cmd+Shift+Z)">
          <span class="button-icon">↪</span>
        </button>
        <button id="clear-button" class="header-button" title="Clear Project (Cmd+Shift+K)">
          <span class="button-icon">🗑️</span>
        </button>
      </div>
      <div class="header-right">
        <div id="color-palette" class="color-palette hidden">
          <div class="color-palette-label">Color:</div>
          <div class="color-swatch" data-color="#000000" title="Black"></div>
          <div class="color-swatch" data-color="#ffffff" title="White"></div>
          <div class="color-swatch" data-color="#4a9eff" title="Blue"></div>
          <div class="color-swatch" data-color="#ff4444" title="Red"></div>
          <div class="color-swatch" data-color="#ffff00" title="Yellow"></div>
          <div class="color-swatch" data-color="#44ff44" title="Green"></div>
          <div class="color-swatch" data-color="#00ffff" title="Cyan"></div>
          <div class="color-swatch" data-color="#ff00ff" title="Magenta"></div>
          <div class="color-swatch" data-color="#ff9900" title="Orange"></div>
        </div>
        <span class="toolbar-separator"></span>
        <div id="render-mode-group" class="render-mode-group">
          <button id="solid-button" class="render-mode-button active" data-mode="solid" title="Solid Mode">
            <span class="button-icon">🔳</span>
          </button>
          <button id="wireframe-button" class="render-mode-button" data-mode="wireframe" title="Wireframe Mode">
            <span class="button-icon">📐</span>
          </button>
          <button id="xray-button" class="render-mode-button" data-mode="xray" title="X-Ray Mode">
            <span class="button-icon">👁️</span>
          </button>
        </div>
        <span class="toolbar-separator"></span>
        <button id="axes-button" class="header-button active" title="Toggle Axes (A)">
          <span class="button-icon">🔷</span>
        </button>
        <button id="highlight-button" class="header-button active" title="Toggle Edge Lines (H)">
          <span class="button-icon">📐</span>
        </button>
        <span id="measure-distance"></span>
        <button id="measure-button" class="header-button" title="Measure Distance (M)">
          <span class="button-icon">📏</span>
        </button>
        <button id="refresh-context-button" class="header-button" title="Refresh Claude Context">
          <span class="button-icon">🔄</span>
        </button>
        <button id="export-stl-button" class="header-button" title="Export STL (Cmd+E)">
          <span class="button-icon">📦</span>
        </button>
        <button id="fit-view-button" class="header-button" title="Fit to View (F)">
          <span class="button-icon">🔍</span>
        </button>
        <select id="view-dropdown">
          <option value="isometric">Isometric</option>
          <option value="front">Front</option>
          <option value="back">Back</option>
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>
    </div>
    <div id="main-content">
      <div id="viewport">
        <div id="loading-overlay" class="hidden">
          <div class="loading-spinner"></div>
        </div>
      </div>
      <div id="spec-resize-handle"></div>
      <div id="spec-panel">
        <div class="spec-header">Design Spec</div>
        <textarea id="spec-editor" placeholder="Spec will appear here..."></textarea>
        <div class="spec-buttons">
          <button id="spec-load-button">Load</button>
          <button id="spec-save-button">Save</button>
          <button id="spec-build-button">Build</button>
        </div>
      </div>
    </div>
    <div id="chat-panel">
      <div id="chat-resize-handle"></div>
      <div id="chat-messages"></div>
      <div id="chat-input-container">
        <textarea id="chat-input" placeholder="Type a message..."></textarea>
        <button id="send-button">Send</button>
      </div>
    </div>
    <div id="status-bar">
      <span id="status-text">Ready</span>
      <span id="status-stats"></span>
    </div>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
