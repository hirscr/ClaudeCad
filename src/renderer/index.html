<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClaudeCAD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <span class="app-title">ClaudeCAD</span>
      </div>
      <div class="header-right">
        <button id="measure-button" class="header-button" title="Measure distance (M)">
          <span class="measure-icon">📏</span>
          <span class="measure-label">Measure</span>
        </button>
        <select id="view-dropdown">
          <option value="isometric">Isometric</option>
          <option value="front">Front</option>
          <option value="back">Back</option>
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </div>
    </div>
    <div id="viewport">
      <div id="loading-overlay" class="hidden">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <div id="chat-panel">
      <div id="chat-resize-handle"></div>
      <div id="chat-messages"></div>
      <div id="chat-input-container">
        <textarea id="chat-input" placeholder="Type a message..."></textarea>
        <button id="send-button">Send</button>
      </div>
    </div>
    <div id="status-bar">
      <span id="status-text">Ready</span>
      <span id="status-stats"></span>
    </div>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
