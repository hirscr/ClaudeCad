<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClaudeCAD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; overflow: hidden; }
    #viewport { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="viewport"></div>
  <script type="module">
    import * as THREE from '../../node_modules/three/build/three.module.js';

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e1e1e);

    // Camera
    const camera = new THREE.PerspectiveCamera(
      50, 
      window.innerWidth / window.innerHeight, 
      0.1, 
      1000
    );
    camera.position.set(30, 30, 30);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('viewport').appendChild(renderer.domElement);

    // Simple orbit controls
    let isDragging = false;
    let spherical = { radius: 52, phi: Math.PI / 4, theta: Math.PI / 4 };

    function updateCamera() {
      camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
      camera.position.y = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
      camera.position.z = spherical.radius * Math.cos(spherical.phi);
      camera.lookAt(0, 0, 0);
    }
    updateCamera();

    renderer.domElement.addEventListener('mousedown', () => isDragging = true);
    renderer.domElement.addEventListener('mouseup', () => isDragging = false);
    renderer.domElement.addEventListener('mouseleave', () => isDragging = false);
    renderer.domElement.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      spherical.theta -= e.movementX * 0.01;
      spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - e.movementY * 0.01));
      updateCamera();
    });
    renderer.domElement.addEventListener('wheel', (e) => {
      spherical.radius = Math.max(10, Math.min(200, spherical.radius + e.deltaY * 0.1));
      updateCamera();
    });

    // Grid on XY plane
    const grid = new THREE.GridHelper(100, 10, 0x444444, 0x333333);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);

    // Axes
    const axes = new THREE.AxesHelper(20);
    scene.add(axes);

    // Test cube
    const geometry = new THREE.BoxGeometry(20, 20, 10);
    const material = new THREE.MeshStandardMaterial({ 
      color: 0x4a9eff,
      metalness: 0.1,
      roughness: 0.6
    });
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(10, 10, 5);
    scene.add(cube);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 50, 50);
    scene.add(dirLight);

    // Render loop
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('SUCCESS: Three.js viewport running');
  </script>
</body>
</html>
